version: '3.8'

networks:
  techmove-network:
    driver: bridge

services:
  # Container 1: SQL Server Database
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: techmove-sql-server
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=MyPassword123!
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - techmove-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "MyPassword123!" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Container 2: Web API (Backend)
  glms-backend-api:
    build:
      context: .
      dockerfile: TechMove/TechMove.API/Dockerfile
    container_name: techmove-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Server=sql-server-db;Database=TechMoveLogisticsDB;User Id=sa;Password=MyPassword123!;TrustServerCertificate=true;MultipleActiveResultSets=true
    ports:
      - "7001:80"
    depends_on:
      sql-server-db:
        condition: service_healthy
    networks:
      - techmove-network
    restart: on-failure

  # Container 3: MVC Client (Frontend)
  glms-frontend-web:
    build:
      context: .
      dockerfile: TechMove/TechMove/Dockerfile
    container_name: techmove-mvc
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ApiBaseUrl=http://glms-backend-api:80/
    ports:
      - "7031:80"
    depends_on:
      - glms-backend-api
    networks:
      - techmove-network
    restart: on-failure

volumes:
  sqlserver_data:
    driver: local